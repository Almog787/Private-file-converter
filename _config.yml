# --------- הגדרות ראשיות של האתר ---------
title: Global Calc Hub
description: "Data-driven insights and professional tools for a smarter life."
url: "https://globalcalcpro.com"
baseurl: "" # יישאר ריק כי האתר בדומיין ראשי

# --------- תפריט הניווט הראשי ---------
navigation:
  - title: Finance
    url: "/blog.html?category=Finance"
  - title: Tech
    url: "/blog.html?category=Tech"
  - title: Lifestyle
    url: "/blog.html?category=Lifestyle"
  - title: Free Tools
    url: "/tools.html"

# --------- הגדרות טכניות של Jekyll ---------
# מבנה הקישורים למאמרים (נקי וידידותי ל-SEO)
permalink: /:year/:month/:slug/

# תוספים מובנים של GitHub Pages ל-SEO
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# --- כאן התיקון הקריטי ---
# קבצים ותיקיות ש-Jekyll יתעלם מהם בזמן הבנייה כדי למנוע שגיאות
exclude:
  - .github/
  - node_modules/
  - package.json
  - package-lock.json
  - tailwind.config.js
  - README.md
