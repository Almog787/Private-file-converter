---
layout: default
---
<!-- אזור המאמר הראשי -->
<main class="py-12 px-6 flex-grow w-full">
    <article class="max-w-3xl mx-auto bg-white p-8 md:p-12 rounded-3xl shadow-sm border border-slate-100 relative">
        
        <!-- חזרה אחורה (Back to Blog) - מופיע רק במאמרים -->
        <a href="{{ '/blog.html' | relative_url }}" class="absolute top-8 left-8 text-sm font-bold text-slate-400 hover:text-primary transition-colors hidden md:flex items-center gap-1">
            <span class="material-symbols-outlined text-sm">arrow_back</span> Blog
        </a>

        <!-- כותרת ופרטי המאמר -->
        <header class="mb-10 text-center mt-8 md:mt-0">
            <span class="text-xs font-bold text-primary uppercase tracking-[0.2em] bg-blue-50 px-4 py-1.5 rounded-full inline-block mb-6">{{ page.tag }}</span>
            <h1 class="text-3xl md:text-5xl font-bold font-headline mb-6 leading-tight text-slate-900">{{ page.title }}</h1>
            
            <div class="text-slate-400 text-sm flex items-center justify-center gap-4 border-t border-slate-100 pt-6 mt-6 max-w-md mx-auto">
                <span class="flex items-center gap-1">
                    <span class="material-symbols-outlined text-sm">calendar_today</span> 
                    {{ page.date | date: "%B %-d, %Y" }}
                </span>
                <span class="flex items-center gap-1">
                    <span class="material-symbols-outlined text-sm">schedule</span> 
                    5 min read
                </span>
            </div>
        </header>

        <!-- התמונה הראשית (Hero Image) - מוצגת רק אם הוגדרה -->
        {% if page.image %}
        <figure class="w-full mb-12 overflow-hidden rounded-[2rem] shadow-md border border-slate-100 group">
            <img src="{{ page.image }}" alt="{{ page.title }}" class="w-full h-72 md:h-[400px] object-cover group-hover:scale-105 transition-transform duration-1000">
        </figure>
        {% endif %}

        <!-- מיקום לפרסומת בתוך המאמר (AdSense In-Article) -->
        <div class="w-full h-[90px] border-2 border-dashed border-slate-200 bg-slate-50 flex items-center justify-center text-slate-400 text-sm mb-12 rounded-xl">
            AdSense Placement
        </div>

        <!-- גוף המאמר המעוצב אוטומטית (Tailwind Typography plugin) -->
        <div class="prose prose-lg prose-slate prose-headings:font-headline prose-a:text-primary prose-a:font-semibold prose-a:no-underline hover:prose-a:underline prose-img:rounded-2xl max-w-none">
            {{ content }}
        </div>

        <!-- אזור שיתוף למטה (אופציונלי, עוזר לוויראליות) -->
        <div class="mt-16 pt-8 border-t border-slate-100 flex flex-col md:flex-row items-center justify-between gap-4">
            <span class="font-bold text-slate-900">Share this insight:</span>
            <div class="flex gap-3">
                <a href="https://twitter.com/intent/tweet?text={{ page.title | url_encode }}&url={{ site.url }}{{ page.url }}" target="_blank" rel="noopener noreferrer" class="bg-slate-100 hover:bg-[#1DA1F2] hover:text-white text-slate-500 w-10 h-10 rounded-full flex items-center justify-center transition-colors">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="M8.29 20.251c7.547 0 11.675-6.253 11.675-11.675 0-.178 0-.355-.012-.53A8.348 8.348 0 0022 5.92a8.19 8.19 0 01-2.357.646 4.118 4.118 0 001.804-2.27 8.224 8.224 0 01-2.605.996 4.107 4.107 0 00-6.993 3.743 11.65 11.65 0 01-8.457-4.287 4.106 4.106 0 001.27 5.477A4.072 4.072 0 012.8 9.713v.052a4.105 4.105 0 003.292 4.022 4.095 4.095 0 01-1.853.07 4.108 4.108 0 003.834 2.85A8.233 8.233 0 012 18.407a11.616 11.616 0 006.29 1.84"></path></svg>
                </a>
                <a href="https://www.facebook.com/sharer/sharer.php?u={{ site.url }}{{ page.url }}" target="_blank" rel="noopener noreferrer" class="bg-slate-100 hover:bg-[#4267B2] hover:text-white text-slate-500 w-10 h-10 rounded-full flex items-center justify-center transition-colors">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path fill-rule="evenodd" d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z" clip-rule="evenodd"></path></svg>
                </a>
            </div>
        </div>

    </article>
</main>
