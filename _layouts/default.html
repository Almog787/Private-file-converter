<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    
    {% seo %}
    <!-- דרישת חובה עבור Google Discover להצגת תמונות גדולות -->
    <meta name="robots" content="max-image-preview:large">
    
    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="article">
    <meta property="og:title" content="{{ page.title }} | Global Calc Hub">
    <meta property="og:description" content="{{ page.description }}">
    <meta property="og:image" content="{{ page.image | absolute_url }}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta name="twitter:card" content="summary_large_image">
    
    <link rel="icon" href="{{ '/favicon.svg' | relative_url }}" type="image/svg+xml">
    
    <!-- Google tag (gtag.js) & Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VBS74DCCQ8"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-VBS74DCCQ8');
    </script>

    <!-- Google Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Manrope:wght@400;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400" rel="stylesheet" media="print" onload="this.media='all'"/>
    
    <!-- CSS (Tailwind Build) -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    
    <style> 
      .mesh-gradient-bg { background: radial-gradient(at top left, rgba(0, 74, 198, 0.03) 0%, transparent 50%), radial-gradient(at bottom right, rgba(67, 56, 217, 0.03) 0%, transparent 50%); }
      
      .nav-link {
          transition: all 0.2s ease;
      }
      .nav-link:hover { color: #004ac6; }
    </style>
</head>
<body class="mesh-gradient-bg font-body text-slate-900 flex flex-col min-h-screen">

    <!-- Header -->
    <header class="w-full bg-white/90 backdrop-blur-xl border-b border-slate-100 sticky top-0 z-[100]">
        <nav class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            
            <!-- לוגו (חזרה לדף הבית) -->
            <a href="{{ '/' | relative_url }}" class="text-2xl font-bold font-headline tracking-tighter text-primary hover:opacity-80 transition-opacity shrink-0">
                Global Calc Hub
            </a>
            
            <!-- תפריט ניווט מינימליסטי -->
            <div class="flex items-center gap-x-6 md:gap-x-8 font-headline font-semibold text-sm">
                <!-- קישור ראשי למאמרים -->
                <a href="{{ '/insights/' | relative_url }}" class="nav-link text-slate-600 shrink-0">Insights</a>
                
                <!-- כפתור בולט לכל המחשבונים -->
                <a href="{{ '/tools/' | relative_url }}" class="flex items-center gap-1.5 bg-primary text-white px-5 py-2 rounded-full shadow-lg shadow-primary/20 hover:bg-blue-700 hover:scale-105 transition-all shrink-0">
                    <span class="material-symbols-outlined text-lg">grid_view</span>
                    Free Tools
                </a>
            </div>

        </nav>
    </header>

    <!-- תוכן העמוד -->
    <div class="flex-grow">
        {{ content }}
    </div>

    <!-- Footer -->
    <footer class="text-center py-12 text-slate-400 text-sm mt-auto bg-white border-t border-slate-100">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6 text-left">
            <div>
                <div class="font-headline font-bold text-slate-900 text-lg">Global Calc Hub</div>
                <p>© 2026 Calculated Insights. All rights reserved.</p>
            </div>
            <div class="flex gap-6 font-semibold">
                <a href="{{ '/privacy/' | relative_url }}" class="hover:text-primary transition-colors">Privacy</a>
                <a href="{{ '/terms/' | relative_url }}" class="hover:text-primary transition-colors">Terms</a>
            </div>
        </div>
    </footer>

</body>
</html>
