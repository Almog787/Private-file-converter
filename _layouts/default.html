<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    
    {% seo %}
    <meta name="robots" content="max-image-preview:large">
    
    <meta property="og:type" content="article">
    <meta property="og:title" content="{{ page.title }} | Global Calc Hub">
    <meta property="og:description" content="{{ page.description }}">
    <meta property="og:image" content="{{ page.image | absolute_url }}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta name="twitter:card" content="summary_large_image">
    
    <link rel="icon" href="{{ '/favicon.svg' | relative_url }}" type="image/svg+xml">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VBS74DCCQ8"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-VBS74DCCQ8');
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Manrope:wght@400;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400" rel="stylesheet" media="print" onload="this.media='all'"/>
    
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    
    <style> 
      .mesh-gradient-bg { background: radial-gradient(at top left, rgba(0, 74, 198, 0.03) 0%, transparent 50%), radial-gradient(at bottom right, rgba(67, 56, 217, 0.03) 0%, transparent 50%); }
      
      /* לוגיקת הצגת תפריט - הגנה נוספת מעבר ל-Tailwind */
      #mobile-menu {
          transition: max-height 0.3s ease-in-out;
          max-height: 0;
          overflow: hidden;
      }
      #mobile-menu.open {
          max-height: 500px;
      }

      /* כפייה של הסתרת אלמנטים לפי רוחב מסך (Desktop First Safety) */
      @media (min-width: 768px) {
          #hamburger-btn { display: none !important; }
          #mobile-menu { display: none !important; }
          #desktop-menu { display: flex !important; }
      }
      @media (max-width: 767px) {
          #desktop-menu { display: none !important; }
          #hamburger-btn { display: block !important; }
      }
    </style>
</head>
<body class="mesh-gradient-bg font-body text-slate-900 flex flex-col min-h-screen">

    <header class="w-full bg-white/80 backdrop-blur-xl border-b border-slate-100 py-4 sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <!-- לוגו -->
            <a href="{{ '/' | relative_url }}" class="text-2xl font-bold font-headline tracking-tighter text-primary hover:opacity-80 transition-opacity">Global Calc Hub</a>
            
            <!-- תפריט מחשב (יוצג רק ב-Desktop) -->
            <div id="desktop-menu" class="items-center gap-8 font-headline font-semibold text-sm">
                {% for item in site.navigation %}
                    <a href="{{ item.url | relative_url }}" class="hover:text-primary transition-colors {% if item.title == 'Free Tools' %}bg-primary text-white px-4 py-2 rounded-full shadow-md hover:bg-blue-700{% endif %}">
                        {{ item.title }}
                    </a>
                {% endfor %}
            </div>

            <!-- כפתור המבורגר (יוצג רק ב-Mobile) -->
            <button id="hamburger-btn" onclick="toggleMenu()" class="p-2 text-slate-600 hover:bg-slate-50 rounded-lg transition-colors">
                <span id="menu-icon" class="material-symbols-outlined text-3xl">menu</span>
            </button>
        </nav>

        <!-- תפריט סלולרי נפתח (יוצג רק ב-Mobile) -->
        <div id="mobile-menu" class="bg-white/95 backdrop-blur-md">
            <div class="px-6 py-6 flex flex-col gap-5 font-headline font-semibold text-lg">
                {% for item in site.navigation %}
                    <a href="{{ item.url | relative_url }}" class="py-2 border-b border-slate-50 last:border-0 hover:text-primary transition-colors" onclick="toggleMenu()">
                        {{ item.title }}
                    </a>
                {% endfor %}
            </div>
        </div>
    </header>

    <div class="flex-grow">
        {{ content }}
    </div>

    <footer class="text-center py-12 text-slate-400 text-sm mt-auto bg-white border-t border-slate-100">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6 text-left">
            <div>
                <div class="font-headline font-bold text-slate-900 text-lg">Global Calc Hub</div>
                <p>© 2026 Calculated Insights. All rights reserved.</p>
            </div>
            <div class="flex gap-6 font-semibold">
                <a href="{{ '/privacy.html' | relative_url }}" class="hover:text-primary transition-colors">Privacy</a>
                <a href="{{ '/terms.html' | relative_url }}" class="hover:text-primary transition-colors">Terms</a>
            </div>
        </div>
    </footer>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            const icon = document.getElementById('menu-icon');
            
            menu.classList.toggle('open');
            
            if (menu.classList.contains('open')) {
                icon.innerText = 'close';
            } else {
                icon.innerText = 'menu';
            }
        }
        
        // סגירת תפריט אוטומטית אם מגדילים את המסך חזרה למצב מחשב
        window.addEventListener('resize', () => {
            if (window.innerWidth >= 768) {
                const menu = document.getElementById('mobile-menu');
                const icon = document.getElementById('menu-icon');
                menu.classList.remove('open');
                icon.innerText = 'menu';
            }
        });
    </script>

</body>
</html>
