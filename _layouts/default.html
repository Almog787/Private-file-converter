<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    
    {% seo %}
    <meta name="robots" content="max-image-preview:large">
    
    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="article">
    <meta property="og:title" content="{{ page.title }} | Global Calc Hub">
    <meta property="og:description" content="{{ page.description }}">
    <meta property="og:image" content="{{ page.image | absolute_url }}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta name="twitter:card" content="summary_large_image">
    
    <link rel="icon" href="{{ '/favicon.svg' | relative_url }}" type="image/svg+xml">
    
    <!-- Google tag (gtag.js) & Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VBS74DCCQ8"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-VBS74DCCQ8');
    </script>

    <!-- Google Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Manrope:wght@400;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400" rel="stylesheet" media="print" onload="this.media='all'"/>
    
    <!-- CSS (Tailwind Build) -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    
    <style> 
      .mesh-gradient-bg { background: radial-gradient(at top left, rgba(0, 74, 198, 0.03) 0%, transparent 50%), radial-gradient(at bottom right, rgba(67, 56, 217, 0.03) 0%, transparent 50%); }
      
      /* מניעת קפיצות תפריט בטעינה */
      .mobile-menu-hidden { display: none; }
      .mobile-menu-visible { display: flex; }
    </style>
</head>
<body class="mesh-gradient-bg font-body text-slate-900 flex flex-col min-h-screen">

    <!-- Header -->
    <header class="w-full bg-white/80 backdrop-blur-xl border-b border-slate-100 py-4 sticky top-0 z-[100]">
        <nav class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <!-- לוגו -->
            <a href="{{ '/' | relative_url }}" class="text-2xl font-bold font-headline tracking-tighter text-primary hover:opacity-80 transition-opacity shrink-0">
                Global Calc Hub
            </a>
            
            <!-- תפריט מחשב (יוצג רק מ-768px ומעלה) -->
            <div class="hidden md:flex items-center gap-8 font-headline font-semibold text-sm">
                {% for item in site.navigation %}
                    <a href="{{ item.url | relative_url }}" class="hover:text-primary transition-colors {% if item.title == 'Free Tools' %}bg-primary text-white px-4 py-2 rounded-full shadow-md hover:bg-blue-700{% endif %}">
                        {{ item.title }}
                    </a>
                {% endfor %}
            </div>

            <!-- כפתור המבורגר (יוצג רק מתחת ל-768px) -->
            <button id="menu-toggle" class="md:hidden p-2 text-slate-600 hover:bg-slate-50 rounded-lg transition-colors focus:outline-none" aria-label="Toggle Menu">
                <span id="menu-icon" class="material-symbols-outlined text-3xl">menu</span>
            </button>
        </nav>

        <!-- תפריט סלולרי נפתח (מוסתר כברירת מחדל ב-CSS) -->
        <div id="mobile-nav" class="mobile-menu-hidden md:hidden bg-white border-t border-slate-50 w-full">
            <div class="px-6 py-6 flex flex-col gap-5 font-headline font-semibold text-lg text-slate-800">
                {% for item in site.navigation %}
                    <a href="{{ item.url | relative_url }}" class="hover:text-primary transition-colors border-b border-slate-50 pb-2 last:border-0">
                        {{ item.title }}
                    </a>
                {% endfor %}
            </div>
        </div>
    </header>

    <!-- תוכן העמוד -->
    <div class="flex-grow">
        {{ content }}
    </div>

    <!-- Footer -->
    <footer class="text-center py-12 text-slate-400 text-sm mt-auto bg-white border-t border-slate-100">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6 text-left">
            <div>
                <div class="font-headline font-bold text-slate-900 text-lg">Global Calc Hub</div>
                <p>© 2026 Calculated Insights. All rights reserved.</p>
            </div>
            <div class="flex gap-6 font-semibold">
                <a href="{{ '/privacy.html' | relative_url }}" class="hover:text-primary transition-colors">Privacy</a>
                <a href="{{ '/terms.html' | relative_url }}" class="hover:text-primary transition-colors">Terms</a>
            </div>
        </div>
    </footer>

    <!-- לוגיקה לתפריט -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const btn = document.getElementById('menu-toggle');
            const nav = document.getElementById('mobile-nav');
            const icon = document.getElementById('menu-icon');

            btn.addEventListener('click', function() {
                const isOpen = nav.classList.contains('mobile-menu-visible');
                
                if (isOpen) {
                    nav.classList.remove('mobile-menu-visible');
                    nav.classList.add('mobile-menu-hidden');
                    icon.innerText = 'menu';
                } else {
                    nav.classList.remove('mobile-menu-hidden');
                    nav.classList.add('mobile-menu-visible');
                    icon.innerText = 'close';
                }
            });

            // סגירה אוטומטית במעבר למסך רחב למניעת באגים
            window.addEventListener('resize', function() {
                if (window.innerWidth >= 768) {
                    nav.classList.remove('mobile-menu-visible');
                    nav.classList.add('mobile-menu-hidden');
                    icon.innerText = 'menu';
                }
            });
        });
    </script>

</body>
</html>
