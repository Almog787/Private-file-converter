<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    
    {% seo %}
    <link rel="icon" href="{{ '/favicon.svg' | relative_url }}" type="image/svg+xml">
    
    <!-- Google tag (gtag.js) & Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VBS74DCCQ8"></script>
    <script>
      window.dataLayer = window.dataLayer ||[];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-VBS74DCCQ8');
    </script>

    <!-- Google Fonts - טעינה אסינכרונית -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Manrope:wght@400;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400" rel="stylesheet" media="print" onload="this.media='all'"/>
    
    <!-- 🛑 הסרנו את הסקריפט הגדול של Tailwind -->
    <!-- ✅ והוספנו את הקישור לקובץ ה-CSS הקטן והמותאם אישית -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    
    <style> 
      .mesh-gradient-bg { background: radial-gradient(at top left, rgba(0, 74, 198, 0.03) 0%, transparent 50%), radial-gradient(at bottom right, rgba(67, 56, 217, 0.03) 0%, transparent 50%); }
    </style>
</head>
<body class="mesh-gradient-bg font-body text-slate-900 flex flex-col min-h-screen">

    <header class="w-full bg-white/80 backdrop-blur-xl border-b border-slate-100 py-4 sticky top-0 z-50">
        <nav class="flex justify-between items-center px-6 py-4 max-w-7xl mx-auto">
            <a href="{{ '/' | relative_url }}" class="text-2xl font-bold font-headline tracking-tighter text-primary">Global Calc Hub</a>
            <div class="hidden md:flex gap-8 font-headline font-semibold text-sm">
                <a href="{{ '/compound-interest.html' | relative_url }}" class="hover:text-primary transition-colors">Compound Interest</a>
                <a href="{{ '/percentage.html' | relative_url }}" class="hover:text-primary transition-colors">Percentage</a>
                <a href="{{ '/unit-converter.html' | relative_url }}" class="hover:text-primary transition-colors">Unit Converter</a>
                <a href="{{ '/blog.html' | relative_url }}" class="hover:text-primary transition-colors">Blog</a>
            </div>
        </nav>
    </header>

    {{ content }}

    <footer class="text-center py-12 text-slate-400 text-sm mt-auto bg-white border-t border-slate-100">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="font-headline font-bold text-slate-900 text-lg">Global Calc Hub</div>
            <p>© 2026 Precision Engineering. All rights reserved.</p>
            <div class="flex gap-6">
                <a href="{{ '/privacy.html' | relative_url }}" class="hover:text-primary transition-colors">Privacy</a>
                <a href="{{ '/terms.html' | relative_url }}" class="hover:text-primary transition-colors">Terms</a>
            </div>
        </div>
    </footer>

</body>
</html>
