name: Dynamic Sitemap Crawler

on:
  push:
    branches: [ main ]
  # מאפשר להריץ את הסריקה גם ידנית בלחיצת כפתור ב-GitHub
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Sitemap by Crawling
        uses: f-drop/sitemap-generator-action@master
        with:
          # הכתובת לסריקה
          base-url: https://almog787.github.io/Private-file-converter/
          # שם הקובץ שיווצר
          file-name: sitemap.xml
          # סריקה לעומק (חשוב אם יש הרבה דפים)
          crawl-max-depth: 5

      - name: Create Robots.txt
        run: |
          echo "User-agent: *" > robots.txt
          echo "Allow: /" >> robots.txt
          echo "Sitemap: https://almog787.github.io/Private-file-converter/sitemap.xml" >> robots.txt

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml robots.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-crawled sitemap updated" && git push)
