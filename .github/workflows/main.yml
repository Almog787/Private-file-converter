name: SEO & Blog Automation

on:
  push:
    branches: [ main ]
    paths:
      - '**/*.html'
      - 'favicon.svg'
      - 'build-blog.js' # מריץ גם אם שינית את הסקריפט
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      # -- שלב חדש: הרצת הסקריפט שבונה את קובץ המאמרים (posts.json) --
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Generate Blog JSON
        run: node build-blog.js
      # ------------------------------------------------------------------

      - name: Generate Sitemap
        uses: cicirello/generate-sitemap@v1
        with:
          base-url-path: https://globalcalcpro.com/
          drop-html-extension: false
          exclude-file: "['privacy.html', 'terms.html']"

      - name: Create Optimized Robots.txt
        run: |
          cat <<EOF > robots.txt
          User-agent: *
          Allow: /
          Disallow: /.git/
          Disallow: /.github/
          Disallow: /templates/
          Sitemap: https://globalcalcpro.com/sitemap.xml
          EOF

      - name: Commit and Push Updates
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          # הוספת ה-JSON החדש לקומיט
          git add sitemap.xml robots.txt posts.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🚀 Auto-build: Sitemap, Robots & Blog Data" && git push)
