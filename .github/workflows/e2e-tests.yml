# קובץ זה מיועד רק להרצת בדיקות הדפדפן (Playwright)
# הוא רץ במקביל לפריסת האתר (Jekyll Deploy)
name: E2E Calculator Tests

on:
  push:
    branches: ["main"]
    # נריץ את הבדיקות רק אם קובץ רלוונטי השתנה
    paths:
      - '**/*.html'
      - 'test/**'
      - 'package.json'
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test:
    name: Run Playwright Tests
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      # התקנת הדפדפנים הווירטואליים שבהם ירוץ הבוט
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      # בניית אתר Jekyll לתיקיית _site (בדיוק כמו שקורה בפריסה)
      - name: Build Jekyll Site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      # הקמת השרת המקומי והרצת הבדיקות
      - name: Run Playwright Tests
        run: |
          # מפעיל את השרת ברקע (&)
          npx serve -p 4000 _site &
          
          # מחכה קצת שהשרת יעלה
          sleep 3
          
          # מריץ את הבדיקות
          npm run test
        env:
          # משתנה סביבה כדי ש-Playwright ידע לאן לגשת
          BASE_URL: http://127.0.0.1:4000

      # העלאת דוח הבדיקות (במקרה של כישלון, תוכל לראות בדיוק מה קרה)
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
