name: OpenClaw Repository Optimizer Agent

on:
  schedule:
    - cron: '0 0 * * 0' # Runs every Sunday at 00:00 UTC
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

permissions:
  contents: write # Required to push optimized code and memory files back to the repo

jobs:
  optimize-repo:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Guardrail against infinite optimization loops

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install OpenClaw
        run: npm install -g openclaw

      - name: Run OpenClaw SEO & UI Optimization
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AGENT_TASK: >-
            OBJECTIVE: Scan the repository for existing Jekyll and calculator files, optimize them for SEO, accessibility (Google Lighthouse standards), and user retention, and log actions in memory.
            DIRECTORIES TO IGNORE: .git, node_modules, _site, .github.
            STEPS:
            1. Read 'agent_memory.json' if it exists to align with previous updates.
            2. Analyze '_config.yml' and top-level HTML/Markdown files to check for missing SEO meta tags, descriptions, and structural layout issues.
            3. Scan all HTML and JavaScript files related to calculators (e.g., look for interactive tools, calculators, or index.html) to improve user experience, add clear instructions, optimize UI components, and fix script bugs.
            4. Upgrade CSS/HTML layout elements to enhance mobile responsiveness and visual appeal.
            5. Append a summary of all optimized files and implemented improvements to 'agent_memory.json'.
            6. Terminate execution immediately and output 'OPTIMIZATION_COMPLETE'.
        run: |
          openclaw --headless --yes --task "$AGENT_TASK"

      - name: Commit and Push Optimized Code
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          
          if git diff --staged --quiet; then
            echo "No optimizations or modifications were made by the agent."
          else
            git commit -m "auto(agent): optimize repository code, UI layout, and SEO parameters"
            git push origin ${{ github.ref_name }}
          fi
