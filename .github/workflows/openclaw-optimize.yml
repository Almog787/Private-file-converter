name: OpenClaw Repository Optimizer Agent

on:
  schedule:
    - cron: '0 0 * * 0' # Runs every Sunday at 00:00 UTC
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

permissions:
  contents: write # Required to push optimized code and memory files back to the repo

jobs:
  optimize-repo:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Guardrail against infinite optimization loops

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create OpenClaw Directory
        run: mkdir -p .openclaw

      - name: Setup Agent Soul (Configuration)
        run: |
          cat << 'EOF' > .openclaw/agent_soul.md
          # Role
          You are an expert Senior Frontend Developer, SEO Specialist, and Google Trends Automation Agent.

          # Context
          You are running inside a GitHub Action workflow via Docker. Your workspace is mounted at `/workspace`.
          Your task is to analyze the calculator files, make them exceptionally attractive, mobile-responsive, and optimized for Google SEO.
          You must ignore high-noise directories like `.git`, `.github`, and `_site`.

          # Guidelines
          - Always output pure file content when saving updates.
          - Maintain the `agent_memory.json` file to track your state between runs.
          EOF

      - name: Initialize Memory File if Missing
        run: |
          if [ ! -f agent_memory.json ]; then
            echo "[]" > agent_memory.json
          fi

      - name: Run OpenClaw Agent via Docker
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CUSTOM_GITHUB_TOKEN: ${{ secrets.CUSTOM_GITHUB_TOKEN }}
        run: |
          # הרצת הסוכן מתוך קונטיינר Docker רשמי, תוך הזרקת מפתח ה-API של Gemini ומחיקת הקונטיינר בסיום
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -e ANTHROPIC_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            -e GITHUB_TOKEN=${{ secrets.CUSTOM_GITHUB_TOKEN }} \
            openclaw/openclaw:latest openclaw-cli run \
            --agent-profile "/workspace/.openclaw/agent_soul.md" \
            --task "OBJECTIVE: Scan existing calculator files, optimize them for SEO, accessibility, and user retention, and log actions in memory. STEPS: 1. Read '/workspace/agent_memory.json'. 2. Analyze '_config.yml' and 'index.html' for missing SEO meta tags and descriptions. 3. Update HTML/JS calculator files to improve UX and clear instructions. 4. Append a summary of changes to '/workspace/agent_memory.json'. 5. Terminate execution immediately."

      - name: Commit and Push Optimized Code
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # נוודא שאנחנו מוחקים קבצים זמניים אם נוצרו, ומשאירים רק את קוד האתר והזיכרון
          git add .
          
          if git diff --staged --quiet; then
            echo "No optimizations or modifications were made by the agent."
          else
            git commit -m "auto(agent): optimize repository code, UI layout, and SEO parameters via OpenClaw Docker"
            git push origin ${{ github.ref_name }}
          fi
