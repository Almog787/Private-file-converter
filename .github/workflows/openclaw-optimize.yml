name: OpenClaw Repository Optimizer & Publisher Agent

on:
  schedule:
    - cron: '0 0 * * 0' # Runs every Sunday at 00:00 UTC
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

permissions:
  contents: write # Required to push optimized code and articles back to the repo

jobs:
  optimize-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Guardrail against infinite loops

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Google Gen AI SDK
        run: npm install @google/genai

      - name: Ensure Posts Directory Exists
        run: mkdir -p _posts

      - name: Run OpenClaw AI Publisher Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node - << 'EOF'
          const fs = require('fs');
          const path = require('path');
          const { GoogleGenAI } = require('@google/genai');

          async function runAgent() {
            if (!process.env.GEMINI_API_KEY) {
              console.error("CRITICAL: Missing GEMINI_API_KEY in GitHub Secrets!");
              process.exit(1);
            }

            // אתחול ה-SDK הרשמי
            const ai = new GoogleGenAI({ apiKey: process.env.GEMINI_API_KEY });
            
            // 1. ניהול הזיכרון של הסוכן
            let memory = [];
            const memoryPath = path.join(process.cwd(), 'agent_memory.json');
            if (fs.existsSync(memoryPath)) {
              try {
                memory = JSON.parse(fs.readFileSync(memoryPath, 'utf8'));
              } catch (e) {
                console.log("Memory file was invalid. Resetting memory.");
              }
            }

            console.log("Step 1: Researching Google Trends and Global News...");
            
            // הגדרת קונטקסט הזיכרון עבור ה-AI כדי שלא יחזור על אותם נושאים
            const pastTopics = memory.map(run => run.published_topic || '').join(', ');

            const trendPrompt = `You are the Google Trends Researcher component of the OpenClaw Agent. 
            Identify the top trending global news, calculators, or viral interactive search queries right now in May 2026.
            Avoid topics already covered recently: [${pastTopics}].
            Select ONE highly compelling trend that can be linked to a useful tool, global calculation, or financial/informational interest.
            Return ONLY the name of the chosen topic/trend. Do not write anything else.`;

            let chosenTrend = "Global Finance Trends";
            try {
              const trendResponse = await ai.models.generateContent({
                model: 'gemini-2.5-flash',
                contents: trendPrompt,
              });
              chosenTrend = trendResponse.text.trim();
              console.log(`Chosen Viral Trend for today: "${chosenTrend}"`);
            } catch (err) {
              console.error("Failed to fetch live trends, using fallback topic.", err);
            }

            console.log("Step 2: Generating SEO-Optimized Jekyll Post...");
            
            const articlePrompt = `You are the Content Creator component of the OpenClaw Agent.
            Write a comprehensive, engaging, and highly interesting article about the viral trend: "${chosenTrend}".
            The article must include detailed information, explanations, and be structured for maximum Google SEO and retention.
            
            CRITICAL: The article must be in valid Jekyll Markdown format with Front Matter.
            Example Front Matter:
            ---
            layout: post
            title: "Viral Title About ${chosenTrend}"
            date: ${new Date().toISOString().split('T')[0]}
            tags: [trend, calculator, ${chosenTrend.toLowerCase().replace(/[^a-z0-9]/g, '')}]
            description: "An SEO description that makes people click from Google search results."
            ---
            
            Inside the article, mention or embed an idea for an interactive tool (like a special percentage calculator or converter) related to this topic.
            Return ONLY the raw markdown content. Do not wrap it in triple backticks (\`\`\`).`;

            let articleContent = "";
            try {
              const articleResponse = await ai.models.generateContent({
                model: 'gemini-2.5-flash',
                contents: articlePrompt,
              });
              articleContent = articleResponse.text.trim();
            } catch (err) {
              console.error("Failed to generate article:", err);
            }

            // שמירת המאמר בפורמט שם תקין של Jekyll: YYYY-MM-DD-title.md
            if (articleContent.length > 100) {
              const datePrefix = new Date().toISOString().split('T')[0];
              const safeTitle = chosenTrend.toLowerCase().replace(/[^a-z0-9]/g, '-').substring(0, 30);
              const postFileName = `${datePrefix}-${safeTitle}.md`;
              const postPath = path.join(process.cwd(), '_posts', postFileName);
              
              fs.writeFileSync(postPath, articleContent, 'utf8');
              console.log(`Successfully published new trend article: ${postFileName}`);
              
              // 3. עדכון הזיכרון
              memory.push({
                run_timestamp: new Date().toISOString(),
                status: "ARTICLE_PUBLISHED",
                published_topic: chosenTrend,
                file_created: `_posts/${postFileName}`
              });
              fs.writeFileSync(memoryPath, JSON.stringify(memory, null, 2), 'utf8');
            } else {
              console.log("Article content was too short or failed generation. Skipping file write.");
            }
          }

          runAgent().catch(err => {
            console.error("Agent execution failed:", err);
            process.exit(1);
          });
          EOF

      - name: Commit and Push New Content
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          
          if git diff --staged --quiet; then
            echo "No new articles or changes were generated by the agent."
          else
            git commit -m "auto(agent): research trends and publish new SEO article to _posts"
            git push origin ${{ github.ref_name }}
          fi
