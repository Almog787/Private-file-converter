name: OpenClaw Repository Optimizer Agent

on:
  schedule:
    - cron: '0 0 * * 0' # Runs every Sunday at 00:00 UTC
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

permissions:
  contents: write # Required to push optimized code and memory files back to the repo

jobs:
  optimize-repo:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Guardrail against infinite optimization loops

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install OpenClaw
        run: npm install -g openclaw

      - name: Create Task File
        run: |
          cat << 'EOF' > openclaw_task.md
          # Objective
          Scan the repository for existing Jekyll and calculator files, optimize them for SEO, accessibility, and user retention, and log actions in memory.

          # Configuration
          Ignore directories: .git, node_modules, _site, .github

          # Execution Steps
          1. Read 'agent_memory.json' if it exists to understand state.
          2. Analyze '_config.yml' and top-level HTML/Markdown files for missing SEO meta tags.
          3. Scan all HTML and JavaScript files related to calculators to improve UX, add instructions, and fix script bugs.
          4. Upgrade CSS/HTML layout elements for mobile responsiveness.
          5. Append a summary of updates to 'agent_memory.json'.
          6. Terminate execution immediately and output 'OPTIMIZATION_COMPLETE'.
          EOF

      - name: Run OpenClaw SEO & UI Optimization
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # שימוש בפקודת run הרשמית והזנת קובץ המשימה כארגומנט נקי
          openclaw run openclaw_task.md --headless --yes

      - name: Cleanup Task File
        run: rm -f openclaw_task.md

      - name: Commit and Push Optimized Code
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          
          if git diff --staged --quiet; then
            echo "No optimizations or modifications were made by the agent."
          else
            git commit -m "auto(agent): optimize repository code, UI layout, and SEO parameters"
            git push origin ${{ github.ref_name }}
          fi
