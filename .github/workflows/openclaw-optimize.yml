name: OpenClaw Repository Optimizer Agent

on:
  schedule:
    - cron: '0 0 * * 0' # Runs every Sunday at 00:00 UTC
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

permissions:
  contents: write # Required to push optimized code and memory files back to the repo

jobs:
  optimize-repo:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Guardrail against infinite optimization loops

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Google Gen AI SDK
        run: npm install @google/genai

      - name: Run OpenClaw AI Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node - << 'EOF'
          const fs = require('fs');
          const path = require('path');
          const { GoogleGenAI } = require('@google/genai');

          async function runAgent() {
            if (!process.env.GEMINI_API_KEY) {
              console.error("CRITICAL: Missing GEMINI_API_KEY in GitHub Secrets!");
              process.exit(1);
            }

            // אתחול ה-SDK הרשמי של גוגל ג'ן איי-איי
            const ai = new GoogleGenAI({ apiKey: process.env.GEMINI_API_KEY });
            
            // 1. ניהול הזיכרון של הסוכן
            let memory = [];
            const memoryPath = path.join(process.cwd(), 'agent_memory.json');
            if (fs.existsSync(memoryPath)) {
              try {
                memory = JSON.parse(fs.readFileSync(memoryPath, 'utf8'));
              } catch (e) {
                console.log("Memory file was invalid. Resetting memory.");
              }
            }

            console.log("Starting repository analysis for Almog787/Global-calculator-pro...");
            
            // 2. סריקה חכמה של קבצי המחשבונים והגדרות האתר
            const targets = ['index.html', '_config.yml'];
            
            // סריקה אוטומטית של קבצי קוד נוספים בשורש המאגר (CSS, JS, HTML)
            fs.readdirSync(process.cwd()).forEach(file => {
              if ((file.endsWith('.js') || file.endsWith('.html') || file.endsWith('.css')) && !targets.includes(file)) {
                targets.push(file);
              }
            });

            const optimizedFiles = [];

            // 3. לולאת הרצה על כל קובץ ושיפורו באמצעות ה-AI
            for (const file of targets) {
              const filePath = path.join(process.cwd(), file);
              if (!fs.existsSync(filePath)) continue;

              console.log(`Agent processing: ${file}`);
              const currentContent = fs.readFileSync(filePath, 'utf8');

              const prompt = `You are the 'OpenClaw' Autonomous AI Agent. Your objective is to optimize the following website file to maximize user retention, traffic, accessibility (Lighthouse standards), and Google SEO rankings.
              
              If it is an HTML or Jekyll file: Ensure proper meta tags, open-graph tags, descriptions, headers hierarchy, and Google-friendly structure exist.
              If it is a JS/Calculator file: Optimize the code logic, make sure instructions are crystal clear for users, and fix any user experience flaws.
              
              CRITICAL: Return ONLY the raw, updated code/text content of the file. Do NOT wrap the response in markdown code blocks (like \`\`\`html). Do not explain your changes.
              
              File Name: ${file}
              Current File Content:
              ${currentContent}`;

              try {
                const response = await ai.models.generateContent({
                  model: 'gemini-2.5-flash',
                  contents: prompt,
                });

                let updatedCode = response.text.trim();
                
                // הגנה מפני מקרה שהמודל בכל זאת החזיר בלוק קוד של מרקדאון
                if (updatedCode.startsWith('\`\`\`')) {
                  updatedCode = updatedCode.replace(/^\`\`\`[a-zA-Z]*\n/, '').replace(/\n\`\`\`$/, '');
                }

                if (updatedCode && updatedCode.length > 10 && updatedCode !== currentContent) {
                  fs.writeFileSync(filePath, updatedCode, 'utf8');
                  optimizedFiles.push(file);
                  console.log(`Successfully optimized and saved: ${file}`);
                }
              } catch (err) {
                console.error(`Failed to process ${file}:`, err);
              }
            }

            // 4. עדכון קובץ הזיכרון לריצה הבאה
            if (optimizedFiles.length > 0) {
              memory.push({
                run_timestamp: new Date().toISOString(),
                status: "OPTIMIZATION_COMPLETE",
                files_improved: optimizedFiles
              });
              fs.writeFileSync(memoryPath, JSON.stringify(memory, null, 2), 'utf8');
              console.log("Agent memory updated successfully.");
            } else {
              console.log("No structural changes were required during this run.");
            }
          }

          runAgent().catch(err => {
            console.error("Agent execution failed:", err);
            process.exit(1);
          });
          EOF

      - name: Commit and Push Optimized Code
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          
          if git diff --staged --quiet; then
            echo "No changes detected. Repository is already fully optimized."
          else
            git commit -m "auto(agent): optimize site structure, calculators UX, and SEO tags via Gemini"
            git push origin ${{ github.ref_name }}
          fi
