
# קובץ פריסה מלא הבונה CSS ו-Jekyll
name: Build and Deploy Jekyll Site

on:
  push:
    branches: ["main"]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # מתקין את התלויות של Tailwind
      - name: Install JS Dependencies
        run: npm install

      # בונה את קובץ ה-CSS הממוזער
      - name: Build Tailwind CSS
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # בונה את אתר ה-Jekyll (שכבר משתמש בקובץ ה-CSS החדש)
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      # מעלה את האתר המוכן לפריסה
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
