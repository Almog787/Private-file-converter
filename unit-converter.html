---
layout: default
title: "Universal Unit Converter"
description: "Convert between metric and imperial units instantly."
---
<main class="pt-12 pb-20 px-6 max-w-7xl mx-auto flex-grow w-full">
    <div class="text-center mb-10">
        <h1 class="text-4xl md:text-5xl font-bold font-headline mb-4">Universal Converter</h1>
        <p class="text-slate-500">Bridge the gap between Metric and Imperial systems.</p>
    </div>

    <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-2xl shadow-blue-900/5 overflow-hidden border border-slate-100 p-8 md:p-12 mb-16">
        <div class="space-y-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 border-b border-slate-100 pb-6">
                <h2 class="text-2xl font-bold font-headline">Select Conversion</h2>
                <select id="unit-type" onchange="initUnitLabels()" class="bg-slate-100 border-none rounded-full px-6 py-3 font-bold text-primary focus:ring-2 focus:ring-primary/20 cursor-pointer">
                    <option value="weight">Weight (KG ↔ LBS)</option>
                    <option value="length">Length (M ↔ FT)</option>
                    <option value="temp">Temperature (C° ↔ F°)</option>
                </select>
            </div>
            
            <div class="grid md:grid-cols-[1fr_auto_1fr] gap-8 items-center bg-slate-50/50 p-6 rounded-2xl border border-slate-100">
                <div class="space-y-2">
                    <label id="label-1" class="text-xs font-bold text-slate-400 uppercase ml-2">Kilograms (KG)</label>
                    <input id="input-1" type="number" oninput="convertMaster(1)" placeholder="0.00" class="w-full bg-white border border-slate-200 rounded-xl p-6 text-3xl font-headline focus:ring-2 focus:ring-primary/20 shadow-sm transition-all text-center">
                </div>
                <div class="flex justify-center transform rotate-90 md:rotate-0">
                    <span class="material-symbols-outlined text-primary text-4xl bg-blue-50 p-3 rounded-full">sync_alt</span>
                </div>
                <div class="space-y-2">
                    <label id="label-2" class="text-xs font-bold text-slate-400 uppercase ml-2">Pounds (LBS)</label>
                    <input id="input-2" type="number" oninput="convertMaster(2)" placeholder="0.00" class="w-full bg-white border border-slate-200 rounded-xl p-6 text-3xl font-headline focus:ring-2 focus:ring-primary/20 shadow-sm transition-all text-center">
                </div>
            </div>
        </div>
    </div>
</main>
<script>
    const unitConfigs = { weight: { l1: "KG", l2: "LBS", ratio: 2.20462, mode: 'mult' }, length: { l1: "Meters", l2: "Feet", ratio: 3.28084, mode: 'mult' }, temp: { l1: "Celsius", l2: "Fahrenheit", mode: 'temp' } };
    function initUnitLabels() { const t = document.getElementById('unit-type').value; document.getElementById('label-1').innerText = unitConfigs[t].l1; document.getElementById('label-2').innerText = unitConfigs[t].l2; document.getElementById('input-1').value = ""; document.getElementById('input-2').value = ""; }
    function convertMaster(src) { const t = document.getElementById('unit-type').value; const c = unitConfigs[t]; const i1 = document.getElementById('input-1'); const i2 = document.getElementById('input-2'); if (c.mode === 'mult') { if (src === 1) i2.value = i1.value ? (i1.value * c.ratio).toFixed(2) : ""; else i1.value = i2.value ? (i2.value / c.ratio).toFixed(2) : ""; } else if (c.mode === 'temp') { if (src === 1) i2.value = i1.value ? ((i1.value * 9/5) + 32).toFixed(1) : ""; else i1.value = i2.value ? ((i2.value - 32) * 5/9).toFixed(1) : ""; } gtag('event', 'convert', { 'event_category': 'Engagement', 'event_label': t }); }
    window.onload = initUnitLabels;
</script>
