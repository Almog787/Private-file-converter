<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title id="dynamic-title">Global Calc Hub | Precision Financial Tools</title>
    <meta name="description" content="Professional calculators for compound interest, percentages, and unit conversions. Fast, accurate, and mobile-friendly.">
    
    <link rel="canonical" href="https://almog787.github.io/Private-file-converter/" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700&display=swap" rel="stylesheet"/>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23004ac6%22/><path d=%22M30 30h40v40H30z%22 fill=%22none%22 stroke=%22white%22 stroke-width=%228%22/><path d=%22M30 45h40M30 55h40M45 30v40M55 30v40%22 stroke=%22white%22 stroke-width=%224%22/></svg>">

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VBS74DCCQ8"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-VBS74DCCQ8');
    </script>

    <script id="tailwind-config">
      tailwind.config = {
        theme: {
          extend: {
            colors: { "primary": "#004ac6", "tertiary": "#4338d9" },
            fontFamily: { "headline": ["Space Grotesk"], "body": ["Manrope"] }
          }
        }
      }
    </script>
    <style>
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); }
        .mesh-gradient-bg { background: radial-gradient(at top left, rgba(0, 74, 198, 0.03) 0%, transparent 50%), radial-gradient(at bottom right, rgba(67, 56, 217, 0.03) 0%, transparent 50%); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="mesh-gradient-bg min-h-screen font-body text-slate-900">

<header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-xl border-b border-slate-100">
    <nav class="flex justify-between items-center px-6 py-4 max-w-7xl mx-auto">
        <a href="#" class="text-2xl font-bold font-headline tracking-tighter text-primary">Global Calc Hub</a>
        <div class="hidden md:flex gap-8 font-headline font-semibold text-sm">
            <button onclick="switchTab('interest')" class="hover:text-primary transition-colors">Compound Interest</button>
            <button onclick="switchTab('percent')" class="hover:text-primary transition-colors">Percentage</button>
            <button onclick="switchTab('unit')" class="hover:text-primary transition-colors">Unit Converter</button>
        </div>
        <button class="p-2 rounded-full bg-slate-100 hover:bg-slate-200 transition-colors">
            <span class="material-symbols-outlined text-slate-600">language</span>
        </button>
    </nav>
</header>

<main class="pt-32 pb-20 px-6 max-w-7xl mx-auto">
    <section class="mb-16 text-center">
        <h1 class="text-5xl md:text-6xl font-bold font-headline mb-4 tracking-tight">Precision at Your <span class="text-primary">Fingertips.</span></h1>
        <p class="text-slate-500 max-w-2xl mx-auto text-lg">Experience high-end analytical tools built for speed and accuracy.</p>
    </section>

    <div class="max-w-4xl mx-auto">
        <div class="bg-white rounded-3xl shadow-2xl shadow-blue-900/5 overflow-hidden border border-slate-100">
            <div class="flex bg-slate-50/50 p-2 gap-2 border-b border-slate-100">
                <button id="btn-interest" onclick="switchTab('interest')" class="tab-btn flex-1 py-4 rounded-2xl transition-all font-bold flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined">payments</span> Interest
                </button>
                <button id="btn-percent" onclick="switchTab('percent')" class="tab-btn flex-1 py-4 rounded-2xl transition-all font-bold flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined">percent</span> Percent
                </button>
                <button id="btn-unit" onclick="switchTab('unit')" class="tab-btn flex-1 py-4 rounded-2xl transition-all font-bold flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined">straighten</span> Units
                </button>
            </div>

            <div class="p-8 md:p-12">
                <div id="tab-interest" class="tab-content">
                    <div class="grid md:grid-cols-2 gap-10">
                        <div class="space-y-5">
                            <h2 class="text-2xl font-bold font-headline">Compound Interest</h2>
                            <div>
                                <label class="text-xs font-bold text-slate-400 uppercase mb-2 block">Initial Amount ($)</label>
                                <input id="p" type="number" value="10000" class="w-full bg-slate-50 border-none rounded-xl p-4 text-lg focus:ring-2 focus:ring-primary/20">
                            </div>
                            <div>
                                <label class="text-xs font-bold text-slate-400 uppercase mb-2 block">Annual Rate (%)</label>
                                <input id="r" type="number" value="7" class="w-full bg-slate-50 border-none rounded-xl p-4 text-lg focus:ring-2 focus:ring-primary/20">
                            </div>
                            <div>
                                <label class="text-xs font-bold text-slate-400 uppercase mb-2 block">Time (Years)</label>
                                <input id="t" type="number" value="10" class="w-full bg-slate-50 border-none rounded-xl p-4 text-lg focus:ring-2 focus:ring-primary/20">
                            </div>
                            <button onclick="calcCompound()" class="w-full bg-primary text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition-all">Calculate</button>
                        </div>
                        <div class="bg-blue-50/50 rounded-2xl p-8 flex flex-col justify-center items-center text-center">
                            <span class="text-sm font-bold text-primary uppercase mb-2">Estimated Total</span>
                            <div id="res-interest-val" class="text-5xl font-headline font-bold text-slate-900">$19,671.51</div>
                            <div id="res-interest-gain" class="text-primary font-bold mt-2">+$9,671 in profit</div>
                        </div>
                    </div>
                </div>

                <div id="tab-percent" class="tab-content">
                    <div class="grid md:grid-cols-2 gap-10">
                        <div class="space-y-5">
                            <h2 class="text-2xl font-bold font-headline">Percentage Finder</h2>
                            <div>
                                <label class="text-xs font-bold text-slate-400 uppercase mb-2 block">What is (%)</label>
                                <input id="perc-val" type="number" placeholder="e.g. 15" class="w-full bg-slate-50 border-none rounded-xl p-4 text-lg focus:ring-2 focus:ring-primary/20">
                            </div>
                            <div>
                                <label class="text-xs font-bold text-slate-400 uppercase mb-2 block">Of Total Amount</label>
                                <input id="perc-total" type="number" placeholder="e.g. 500" class="w-full bg-slate-50 border-none rounded-xl p-4 text-lg focus:ring-2 focus:ring-primary/20">
                            </div>
                            <button onclick="calcPercent()" class="w-full bg-primary text-white py-4 rounded-xl font-bold text-lg">Calculate</button>
                        </div>
                        <div class="bg-slate-50 rounded-2xl p-8 flex flex-col justify-center items-center text-center">
                            <span class="text-sm font-bold text-slate-400 uppercase mb-2">Result</span>
                            <div id="res-percent-val" class="text-5xl font-headline font-bold text-primary">$0.00</div>
                        </div>
                    </div>
                </div>

                <div id="tab-unit" class="tab-content">
                    <div class="space-y-8">
                        <div class="flex flex-col md:flex-row justify-between items-center gap-4 border-b border-slate-100 pb-6">
                            <h2 class="text-2xl font-bold font-headline text-center md:text-left">Multi-Unit Converter</h2>
                            <select id="unit-type" onchange="initUnitLabels()" class="bg-slate-100 border-none rounded-full px-6 py-2 font-bold text-primary focus:ring-2 focus:ring-primary/20">
                                <option value="weight">Weight (KG/LBS)</option>
                                <option value="length">Length (M/FT)</option>
                                <option value="temp">Temp (C°/F°)</option>
                            </select>
                        </div>
                        <div class="grid md:grid-cols-2 gap-8 items-center">
                            <div class="space-y-2">
                                <label id="label-1" class="text-xs font-bold text-slate-400 uppercase ml-2">Kilograms (KG)</label>
                                <input id="input-1" type="number" oninput="convertMaster(1)" placeholder="0.00" class="w-full bg-slate-50 border-none rounded-xl p-5 text-2xl font-headline focus:ring-2 focus:ring-primary/20">
                            </div>
                            <div class="hidden md:flex justify-center"><span class="material-symbols-outlined text-slate-300">sync_alt</span></div>
                            <div class="space-y-2">
                                <label id="label-2" class="text-xs font-bold text-slate-400 uppercase ml-2">Pounds (LBS)</label>
                                <input id="input-2" type="number" oninput="convertMaster(2)" placeholder="0.00" class="w-full bg-slate-50 border-none rounded-xl p-5 text-2xl font-headline focus:ring-2 focus:ring-primary/20">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="text-center py-10 text-slate-400 text-sm border-t border-slate-100 mt-20">
    <p>© 2026 Global Calc Hub | Precision Engineering</p>
</footer>

<script>
    // --- Routing & Tab Management ---
    const tabs = {
        'interest': { title: 'Compound Interest Calculator', btn: 'btn-interest' },
        'percent': { title: 'Percentage Calculator', btn: 'btn-percent' },
        'unit': { title: 'Advanced Unit Converter', btn: 'btn-unit' }
    };

    function switchTab(id, updateHash = true) {
        // Update UI
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.className = "tab-btn flex-1 py-4 rounded-2xl transition-all font-bold flex items-center justify-center gap-2 text-slate-400 hover:bg-slate-100");
        
        document.getElementById('tab-' + id).classList.add('active');
        const activeBtn = document.getElementById('btn-' + id);
        activeBtn.className = "tab-btn flex-1 py-4 rounded-2xl transition-all font-bold flex items-center justify-center gap-2 bg-white shadow-md text-primary";

        // Update SEO Title
        document.getElementById('dynamic-title').innerText = tabs[id].title + " | Global Calc Hub";

        // Update URL Hash for Google Indexing
        if(updateHash) window.location.hash = id;

        // Analytics
        gtag('event', 'page_view', { page_title: tabs[id].title, page_location: window.location.href });
    }

    // Handle initial load and browser back/forward
    window.addEventListener('hashchange', () => {
        const hash = window.location.hash.replace('#', '');
        if (tabs[hash]) switchTab(hash, false);
    });

    // --- Calculator Logic ---
    function calcCompound() {
        const p = parseFloat(document.getElementById('p').value);
        const r = parseFloat(document.getElementById('r').value) / 100;
        const t = parseFloat(document.getElementById('t').value);
        if(isNaN(p) || isNaN(r) || isNaN(t)) return;
        const amount = p * Math.pow((1 + r), t);
        document.getElementById('res-interest-val').innerText = '$' + amount.toLocaleString(undefined, {maximumFractionDigits: 2});
        document.getElementById('res-interest-gain').innerText = '+$' + (amount - p).toLocaleString(undefined, {maximumFractionDigits: 0}) + ' in profit';
    }

    function calcPercent() {
        const v = parseFloat(document.getElementById('perc-val').value);
        const t = parseFloat(document.getElementById('perc-total').value);
        if(isNaN(v) || isNaN(t)) return;
        document.getElementById('res-percent-val').innerText = '$' + ((v/100)*t).toLocaleString();
    }

    // --- Unit Converter Master Logic ---
    const unitConfigs = {
        weight: { l1: "Kilograms (KG)", l2: "Pounds (LBS)", ratio: 2.20462, mode: 'mult' },
        length: { l1: "Meters (M)", l2: "Feet (FT)", ratio: 3.28084, mode: 'mult' },
        temp: { l1: "Celsius (C°)", l2: "Fahrenheit (F°)", mode: 'temp' }
    };

    function initUnitLabels() {
        const type = document.getElementById('unit-type').value;
        document.getElementById('label-1').innerText = unitConfigs[type].l1;
        document.getElementById('label-2').innerText = unitConfigs[type].l2;
        document.getElementById('input-1').value = "";
        document.getElementById('input-2').value = "";
    }

    function convertMaster(source) {
        const type = document.getElementById('unit-type').value;
        const config = unitConfigs[type];
        const in1 = document.getElementById('input-1');
        const in2 = document.getElementById('input-2');

        if (config.mode === 'mult') {
            if (source === 1) in2.value = in1.value ? (in1.value * config.ratio).toFixed(2) : "";
            else in1.value = in2.value ? (in2.value / config.ratio).toFixed(2) : "";
        } else if (config.mode === 'temp') {
            if (source === 1) in2.value = in1.value ? ((in1.value * 9/5) + 32).toFixed(1) : "";
            else in1.value = in2.value ? ((in2.value - 32) * 5/9).toFixed(1) : "";
        }
    }

    // Start Up
    window.onload = () => {
        const hash = window.location.hash.replace('#', '');
        if (tabs[hash]) switchTab(hash, false);
        else switchTab('interest', false);
        initUnitLabels();
        calcCompound();
    };
</script>

</body>
</html>
