<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #64748b;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --accent: #10b981;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, var(--primary-color), #1e40af);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .nav-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .nav-btn.active, .nav-btn:hover {
            background: white;
            color: var(--primary-color);
            transform: translateY(-2px);
        }

        main {
            max-width: 700px;
            margin: 2rem auto;
            flex: 1;
            width: 90%;
        }

        .calc-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            display: none;
            animation: slideUp 0.4s ease-out;
        }

        .calc-card.active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group { margin-bottom: 1.2rem; }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .action-btn {
            width: 100%;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
        }

        .result-box {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #f8fafc;
            border-radius: 8px;
            border-right: 5px solid var(--accent);
            font-weight: bold;
            font-size: 1.1rem;
        }

        .ad-slot {
            margin: 2rem 0;
            background: #f8fafc;
            border: 1px dashed #cbd5e1;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.9rem;
            color: var(--secondary-color);
        }
    </style>
</head>
<body>

<header>
    <h1>Global Calculators Hub</h1>
    <p>כלים פיננסיים ומתמטיים מהירים ומדויקים</p>
    <div class="nav-container">
        <button class="nav-btn active" onclick="switchCalc('interest', this)">ריבית דריבית</button>
        <button class="nav-btn" onclick="switchCalc('percent', this)">מחשבון אחוזים</button>
        <button class="nav-btn" onclick="switchCalc('unit', this)">המרת יחידות</button>
    </div>
</header>

<main>
    <div class="ad-slot">
        פרסומת מותאמת
    </div>

    <section id="interest" class="calc-card active">
        <h2>מחשבון ריבית דריבית</h2>
        <div class="input-group">
            <label>סכום הפקדה ראשוני (₪)</label>
            <input type="number" id="p" value="10000">
        </div>
        <div class="input-group">
            <label>ריבית שנתית באחוזים (%)</label>
            <input type="number" id="r" value="5">
        </div>
        <div class="input-group">
            <label>תקופה בשנים</label>
            <input type="number" id="t" value="10">
        </div>
        <button class="action-btn" onclick="calcCompound()">חשב רווחים</button>
        <div id="res-interest" class="result-box" style="display:none;"></div>
    </section>

    <section id="percent" class="calc-card">
        <h2>מחשבון אחוזים</h2>
        <div class="input-group">
            <label>כמה הם (%)</label>
            <input type="number" id="perc-val" placeholder="למשל 10">
        </div>
        <div class="input-group">
            <label>מתוך סכום של:</label>
            <input type="number" id="perc-total" placeholder="למשל 200">
        </div>
        <button class="action-btn" onclick="calcPercent()">חשב אחוז</button>
        <div id="res-percent" class="result-box" style="display:none;"></div>
    </section>

    <section id="unit" class="calc-card">
        <h2>המרת יחידות משקל</h2>
        <div class="input-group">
            <label>קילוגרם (KG)</label>
            <input type="number" id="kg" oninput="convertUnit('kg')">
        </div>
        <div class="input-group">
            <label>פאונד (LBS)</label>
            <input type="number" id="lbs" oninput="convertUnit('lbs')">
        </div>
    </section>

    <div class="ad-slot">
        פרסומת מותאמת
    </div>
</main>

<footer>
    <p>&copy; 2024 Global Calculator Hub | הכלים החינמיים הטובים ברשת</p>
</footer>

<script>
    // Navigation
    function switchCalc(id, btn) {
        document.querySelectorAll('.calc-card').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    // Compound Interest Calculation: A = P(1 + r/n)^(nt)
    function calcCompound() {
        const p = parseFloat(document.getElementById('p').value);
        const r = parseFloat(document.getElementById('r').value) / 100;
        const t = parseFloat(document.getElementById('t').value);
        
        const amount = p * Math.pow((1 + r), t);
        const profit = amount - p;

        const resDiv = document.getElementById('res-interest');
        resDiv.style.display = 'block';
        resDiv.innerHTML = `
            סכום סופי: ₪${amount.toLocaleString(undefined, {maximumFractionDigits: 2})}<br>
            סך הריבית שנצברה: ₪${profit.toLocaleString(undefined, {maximumFractionDigits: 2})}
        `;
        gtag('event', 'calculate', {'event_category': 'finance', 'event_label': 'compound_interest'});
    }

    // Percentage Calculation
    function calcPercent() {
        const val = parseFloat(document.getElementById('perc-val').value);
        const total = parseFloat(document.getElementById('perc-total').value);
        const result = (val / 100) * total;

        const resDiv = document.getElementById('res-percent');
        resDiv.style.display = 'block';
        resDiv.innerText = `${val}% מתוך ${total} הם: ${result}`;
        gtag('event', 'calculate', {'event_category': 'math', 'event_label': 'percentage'});
    }

    // Local-First Unit Conversion
    function convertUnit(type) {
        const kg = document.getElementById('kg');
        const lbs = document.getElementById('lbs');
        if (type === 'kg') {
            lbs.value = (kg.value * 2.20462).toFixed(2);
        } else {
            kg.value = (lbs.value / 2.20462).toFixed(2);
        }
    }
</script>

</body>
</html>
